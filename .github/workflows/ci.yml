name: CI

on:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - 'android/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          # Robolectric's SDK 35+ android-all images need a Java 21 runtime.
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble, lint and unit-test (prod debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleProdDebug lintProdDebug testProdDebugUnitTest
